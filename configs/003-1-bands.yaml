# Config do experimento 003.1: features por banda de frequência.
#
# Mesma lista de 64 vídeos do 003 + bandas. A presença de `modal.bands` faz
# `analyse_trends` usar `video_band_features` em vez de `video_features` global.
#
# Bandas escolhidas (sem evidência forte ainda — primeira tentativa):
#   - 0.5-3 Hz: vibrações lentas, candidato natural pra freq natural da muda.
#   - 3-10 Hz: faixa intermediária, possível harmônicos.
#   - 10-30 Hz: candidato pro ventilador (motores AC + harmônicos).
#   - 30-120 Hz: ruído de alta freq, eletrônica.

preprocess:
  num_frames: 800
  fps: 240
  scale: 0.2

decomposition:
  num_pcs: 10
  variance_threshold: 0.90

cp:
  short_half_life: 1
  long_half_life: 900000
  max_mask_len: 50
  n_mask_horizon: 10

modal:
  n_peaks: 5
  peak_min_freq: 0.5
  bands:
    - [0.5, 3.0]
    - [3.0, 10.0]
    - [10.0, 30.0]
    - [30.0, 120.0]

paths:
  rois_json: rois/rois.json
  out_dir: out/
  videos_root: /home/ygarasab/mestrado/tese/videos_caseiro_muda_acai

