# Config do experimento 003: usa os 4 ângulos por dia (vaso rotacionado 45°).
# 8 dias × 4 ângulos = 32 vídeos por batch (vs 8 do baseline).
#
# Premissa: a câmera ficou fixa no tripé entre as 4 capturas, então a ROI do
# "principal" (único anotado em rois.json) serve geometricamente pros outros 3
# ângulos do mesmo dia — fallback resolvido por marajo.io.roi.resolve_roi.

preprocess:
  num_frames: 800
  fps: 240
  scale: 0.2

decomposition:
  num_pcs: 10
  variance_threshold: 0.90

cp:
  short_half_life: 1
  long_half_life: 900000
  max_mask_len: 50
  n_mask_horizon: 10

modal:
  n_peaks: 5
  peak_min_freq: 0.5

paths:
  rois_json: rois/rois.json
  out_dir: out/
  videos_root: /home/ygarasab/mestrado/tese/videos_caseiro_muda_acai

