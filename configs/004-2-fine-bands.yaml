# Config do experimento 004.2: sub-bandas finas dentro de 0.5-30 Hz.
#
# 004 removeu o confound da banda 30-120 Hz mas mostrou que ainda há um
# confound residual em april (top_k_freq_mean_median p=0.113,
# energy_concentration_median p=0.138). Aqui quebramos 0.5-30 Hz em sub-bandas
# pra localizar onde ele vive — se for uma faixa específica, podemos restringir
# mais o cutoff. Se for distribuído, é provavelmente confound estrutural
# (crescimento da planta, mudança de câmera G60→Signature).

preprocess:
  num_frames: 800
  fps: 240
  scale: 0.2

decomposition:
  num_pcs: 10
  variance_threshold: 0.90

cp:
  short_half_life: 1
  long_half_life: 900000
  max_mask_len: 50
  n_mask_horizon: 10

modal:
  n_peaks: 5
  peak_min_freq: 0.5
  bands:
    - [0.5, 2.0]
    - [2.0, 5.0]
    - [5.0, 10.0]
    - [10.0, 20.0]
    - [20.0, 30.0]

paths:
  rois_json: rois/rois.json
  out_dir: out/
  videos_root: /home/ygarasab/mestrado/tese/videos_caseiro_muda_acai

