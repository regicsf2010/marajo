# Configuração default do pipeline modular do Eduardo.
# Espelha as constantes que apareciam hardcoded em main_single_video.ipynb e main_over_time.ipynb.

preprocess:
  num_frames: 800
  fps: 240
  scale: 0.2

decomposition:
  num_pcs: 10
  variance_threshold: 0.90  # usado em main_pca pra decidir nPC automaticamente

cp:
  short_half_life: 1
  long_half_life: 900000
  max_mask_len: 50
  n_mask_horizon: 10  # 'n' no CP_alg original

modal:
  n_peaks: 5
  peak_min_freq: 0.5

paths:
  rois_json: rois/rois.json
  out_dir: out/
  # Raiz dos vídeos brutos. Paths em over_time_videos são relativos a este dir
  # (caso sejam relativos; absolutos são respeitados como estão).
  videos_root: /home/ygarasab/mestrado/tese/videos_caseiro_muda_acai

