# Config do experimento 004: igual ao 003 mas com cutoff lowpass post-hoc em 30 Hz.
#
# Motivação: 003.1 mostrou que a banda 30-120 Hz contém confound
# significativo em april (peak_freq MK p=0.027). Restringir features globais
# a freq <= 30 Hz remove esse confound e permite ver se o sinal em february
# emerge nas features clássicas (centroid, spread, flatness, top_k, etc.).
#
# `modal.freq_max: 30` desce no analyse_trends → video_features → spectral_features.

preprocess:
  num_frames: 800
  fps: 240
  scale: 0.2

decomposition:
  num_pcs: 10
  variance_threshold: 0.90

cp:
  short_half_life: 1
  long_half_life: 900000
  max_mask_len: 50
  n_mask_horizon: 10

modal:
  n_peaks: 5
  peak_min_freq: 0.5
  freq_max: 30.0  # descarta bins acima dessa freq (Hz) nas features globais

paths:
  rois_json: rois/rois.json
  out_dir: out/
  videos_root: /home/ygarasab/mestrado/tese/videos_caseiro_muda_acai

